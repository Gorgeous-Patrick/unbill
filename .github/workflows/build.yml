name: Build

on:
  workflow_call:
    inputs:
      tag:
        description: 'Docker image tag (e.g. nightly-20260422-000000, v1.2.3)'
        required: false
        type: string
        default: 'latest'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: false
        type: string
        default: 'test'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p unbill-cli -p unbill-tui

      - name: Stage binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli unbill-cli-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/unbill-tui unbill-tui-${{ matrix.suffix }}

      - name: Stage binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli.exe unbill-cli-${{ matrix.suffix }}.exe
          cp target/${{ matrix.target }}/release/unbill-tui.exe unbill-tui-${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            unbill-cli-${{ matrix.suffix }}*
            unbill-tui-${{ matrix.suffix }}*

  build-tauri:
    name: Build Tauri (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-aarch64
          - os: windows-latest
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: npm install -g @tauri-apps/cli

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/unbill-tauri
          tauriScript: tauri

      - name: Rename artifacts
        shell: bash
        run: |
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | tr -d '\r' | while read -r path; do
            ext="${path##*.}"
            mv "$path" "unbill-${{ matrix.suffix }}.${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-${{ matrix.suffix }}
          path: unbill-${{ matrix.suffix }}.*

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and SDK components
        run: sdkmanager "ndk;26.1.10909125" "build-tools;35.0.0" "platforms;android-36"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Initialize Android project
        run: cargo tauri android init
        working-directory: crates/unbill-tauri

      - name: Build APK (arm64 + armv7)
        run: cargo tauri android build --apk --target aarch64 --target armv7
        working-directory: crates/unbill-tauri

      - name: Build AAB
        run: cargo tauri android build --aab
        working-directory: crates/unbill-tauri

      - name: Stage artifacts
        run: |
          find crates/unbill-tauri/gen/android/app/build/outputs/apk -name "*.apk" | while read -r apk; do
            flavor=$(echo "$apk" | sed 's|.*/apk/||; s|/.*||')
            cp "$apk" "unbill-android-${flavor}.apk"
          done
          find crates/unbill-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -1 | xargs -I{} cp {} unbill-android.aab

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-android
          path: unbill-android*

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          key: ios

      - name: Install binaryen (wasm-opt)
        run: brew install binaryen

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Initialize iOS project
        run: cargo tauri ios init
        working-directory: crates/unbill-tauri

      - name: Build IPA (unsigned)
        run: cargo tauri ios build --target aarch64 --no-sign
        working-directory: crates/unbill-tauri

      - name: Stage IPA
        run: find crates/unbill-tauri/gen/apple -name "*.ipa" | head -1 | xargs -I{} cp {} unbill-ios.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-ios
          path: unbill-ios.ipa

  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/unbill-server:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/unbill-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
